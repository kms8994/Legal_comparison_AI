services:
  backend:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ../../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
